<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>山东省医学会临床输血分会</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 14px;
      }

      body {
        background-color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .banner {
        background: linear-gradient(
          180deg,
          #312ecc 0%,
          #4338ca 30%,
          #0ea5e9 100%
        );
        padding: 3rem 1.5rem;
        position: relative;
        overflow: hidden;
      }

      .banner::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          radial-gradient(
            circle at 10% 20%,
            rgba(255, 255, 255, 0.1) 2px,
            transparent 2px
          ),
          radial-gradient(
            circle at 90% 80%,
            rgba(255, 255, 255, 0.15) 2px,
            transparent 2px
          ),
          radial-gradient(
            circle at 50% 50%,
            rgba(255, 255, 255, 0.08) 1px,
            transparent 1px
          ),
          radial-gradient(
            circle at 70% 10%,
            rgba(255, 255, 255, 0.12) 3px,
            transparent 3px
          );
        background-size:
          100px 100px,
          150px 150px,
          80px 80px,
          120px 120px;
        pointer-events: none;
      }

      .circuit-pattern {
        position: absolute;
        top: 0;
        right: 0;
        width: 70%;
        height: 100%;
        opacity: 0.3;
      }

      .circuit-line {
        stroke: #fff;
        stroke-width: 1.5;
        fill: none;
      }

      .circuit-dot {
        fill: #00f0ff;
      }

      .banner-content {
        position: relative;
        z-index: 1;
      }

      .banner-title {
        font-size: 1.3rem;
        font-weight: bold;
        color: #fff;
        text-align: center;
        line-height: 1.5;
        margin-bottom: 0.8rem;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      .banner-info {
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.95);
        text-align: center;
        line-height: 1.7;
        margin-bottom: 0.3rem;
      }

      .banner-date {
        font-size: 1.05rem;
        color: rgba(255, 255, 255, 0.95);
        text-align: center;
        font-weight: 500;
        margin-top: 0.5rem;
      }

      .content {
        flex: 1;
        padding: 1rem 0.8rem;
        background: #fff;
      }

      .grid-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.6rem;
      }

      .card {
        border-radius: 0.7rem;
        padding: 1rem 0.8rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 7.5rem;
        position: relative;
        cursor: pointer;
        transition: transform 0.2s;
        text-decoration: none;
        color: inherit;
      }

      .card:active {
        transform: scale(0.98);
      }

      .card-large {
        grid-row: span 2;
        background: linear-gradient(
          135deg,
          #1e88e5 0%,
          #1565c0 50%,
          #283593 100%
        );
      }

      .card-hotel {
        background: linear-gradient(135deg, #29b6f6 0%, #0288d1 100%);
      }

      .card-contact {
        background: linear-gradient(
          135deg,
          #cddc39 0%,
          #8bc34a 50%,
          #4caf50 100%
        );
      }

      .card-icon {
        width: 3.2rem;
        height: 3.8rem;
        margin-bottom: 0.8rem;
      }

      .card-icon-small {
        width: 2.2rem;
        height: 2.2rem;
        position: absolute;
        bottom: 0.8rem;
        right: 0.8rem;
      }

      .card-title {
        font-size: 1.2rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.9);
      }

      .card-title-small {
        font-size: 1.15rem;
        font-weight: 600;
        color: rgba(80, 80, 80, 0.8);
        position: absolute;
        top: 1rem;
        left: 1rem;
      }

      .footer {
        background: linear-gradient(180deg, #d0d0d0 0%, #c8c8c8 100%);
        padding: 1rem 1rem 1.2rem;
        text-align: center;
      }

      .footer-copyright {
        font-size: 1rem;
        color: #fff;
        font-weight: 500;
        margin-bottom: 0.5rem;
      }

      .footer-support {
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.9);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.3rem;
        margin-bottom: 0.5rem;
      }

      .footer-logo {
        font-size: 0.9rem;
        color: #0ea5e9;
        font-weight: bold;
      }

      .footer-admin {
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.85);
      }
    </style>
  </head>
  <body>
    <div class="banner">
      <svg class="circuit-pattern" viewBox="0 0 300 400">
        <path
          class="circuit-line"
          d="M200,20 L280,20 L280,80 L220,80 L220,140 L290,140"
        />
        <path class="circuit-line" d="M250,50 L250,120 L180,120 L180,180" />
        <path class="circuit-line" d="M200,200 L280,200 L280,280 L220,280" />
        <path class="circuit-line" d="M150,60 L200,60 L200,100" />
        <path class="circuit-line" d="M240,160 L240,220 L290,220" />
        <path class="circuit-line" d="M160,240 L210,240 L210,320 L270,320" />
        <path class="circuit-line" d="M260,350 L290,350 L290,380" />
        <circle class="circuit-dot" cx="200" cy="20" r="3" />
        <circle class="circuit-dot" cx="280" cy="80" r="3" />
        <circle class="circuit-dot" cx="220" cy="140" r="3" />
        <circle class="circuit-dot" cx="250" cy="120" r="3" />
        <circle class="circuit-dot" cx="180" cy="180" r="3" />
        <circle class="circuit-dot" cx="280" cy="200" r="3" />
        <circle class="circuit-dot" cx="220" cy="280" r="3" />
        <circle class="circuit-dot" cx="200" cy="100" r="3" />
        <circle class="circuit-dot" cx="240" cy="220" r="3" />
        <circle class="circuit-dot" cx="210" cy="320" r="3" />
      </svg>
      <div class="banner-content">
        <h1 class="banner-title">
          山东省医学会临床输血分会血液保护与富血小板血浆拓展应用 新技术培训班
        </h1>
        <p class="banner-info">
          报到和住宿：泰安东尊华美达广场酒店，
          会议地点：泰安东尊华美达广场酒店。
        </p>
        <!-- <p class="banner-info">第九六〇医院内科楼19楼会议室</p> -->
        <p class="banner-date">2026年8月6日-8日</p>
      </div>
    </div>

    <div class="content">
      <div class="grid-container">
        <a href="register.html" class="card card-large">
          <svg class="card-icon" viewBox="0 0 70 80" fill="none">
            <rect
              x="5"
              y="5"
              width="60"
              height="70"
              rx="6"
              stroke="#fff"
              stroke-width="3"
            />
            <rect
              x="15"
              y="18"
              width="20"
              height="18"
              rx="2"
              stroke="#fff"
              stroke-width="3"
            />
            <rect x="15" y="42" width="40" height="3" rx="1" fill="#fff" />
            <rect x="15" y="50" width="40" height="3" rx="1" fill="#fff" />
            <rect x="15" y="58" width="30" height="3" rx="1" fill="#fff" />
            <path
              d="M45,15 L58,28 L48,38 L35,25 Z"
              stroke="#fff"
              stroke-width="2"
              fill="none"
            />
          </svg>
          <span class="card-title">参会回执</span>
        </a>

        <a href="hotel.html" class="card card-hotel">
          <span class="card-title-small">酒店预订</span>
          <svg class="card-icon-small" viewBox="0 0 50 50" fill="none">
            <rect
              x="8"
              y="10"
              width="34"
              height="32"
              rx="3"
              stroke="#fff"
              stroke-width="2.5"
            />
            <rect
              x="14"
              y="16"
              width="10"
              height="10"
              rx="1"
              stroke="#fff"
              stroke-width="2"
            />
            <rect
              x="26"
              y="16"
              width="10"
              height="10"
              rx="1"
              stroke="#fff"
              stroke-width="2"
            />
            <rect x="14" y="30" width="22" height="3" rx="1" fill="#fff" />
            <path d="M20,42 L30,42" stroke="#fff" stroke-width="2" />
          </svg>
        </a>

        <a href="contact.html" class="card card-contact">
          <span class="card-title-small">联系我们</span>
          <svg class="card-icon-small" viewBox="0 0 50 50" fill="none">
            <rect
              x="8"
              y="18"
              width="34"
              height="24"
              rx="3"
              stroke="#fff"
              stroke-width="2.5"
            />
            <rect x="12" y="24" width="5" height="5" rx="1" fill="#fff" />
            <rect x="12" y="32" width="5" height="5" rx="1" fill="#fff" />
            <rect x="20" y="24" width="5" height="5" rx="1" fill="#fff" />
            <rect x="20" y="32" width="5" height="5" rx="1" fill="#fff" />
            <rect x="28" y="24" width="5" height="5" rx="1" fill="#fff" />
            <rect x="28" y="32" width="5" height="5" rx="1" fill="#fff" />
            <path d="M5,18 L12,12 L15,20 Z" fill="#fff" />
            <path
              d="M12,12 Q25,5 38,12"
              stroke="#fff"
              stroke-width="2"
              fill="none"
            />
            <path
              d="M15,20 Q27,14 38,20"
              stroke="#fff"
              stroke-width="2"
              fill="none"
            />
          </svg>
        </a>
      </div>
    </div>

    <div class="footer">
      <p class="footer-copyright">山东省医学会 版权所有</p>
      <!-- <p class="footer-support">
        技术支持 <span class="footer-logo">⛰️ MEDCON</span> 美迪康会务通
      </p> -->
      <!-- <p class="footer-admin">管理入口</p> -->
    </div>
  </body>
</html>
