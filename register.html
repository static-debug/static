<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>参会回执 - 山东省输血协会2026年输血研讨会</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 14px;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei",
          sans-serif;
        background-color: #f5f7fa;
        min-height: 100vh;
        padding-bottom: 2rem;
      }
      .header {
        background: linear-gradient(
          135deg,
          #1e88e5 0%,
          #1565c0 50%,
          #0d47a1 100%
        );
        padding: 1rem;
        display: flex;
        align-items: center;
        color: #fff;
      }
      .back-btn {
        font-size: 1.5rem;
        cursor: pointer;
        padding: 0.3rem 0.5rem;
        margin-right: 0.5rem;
      }
      .header-title {
        font-size: 1.1rem;
        font-weight: 600;
        flex: 1;
        text-align: center;
        margin-right: 2rem;
      }
      .notice-bar {
        background: #e3f2fd;
        padding: 0.8rem 1rem;
        border-bottom: 1px solid #bbdefb;
      }
      .notice-text {
        font-size: 0.85rem;
        color: #1565c0;
        line-height: 1.6;
        display: flex;
        align-items: flex-start;
      }
      .notice-icon {
        margin-right: 0.4rem;
        flex-shrink: 0;
      }
      .form-container {
        padding: 1rem;
      }
      .form-card {
        background: #fff;
        border-radius: 0.7rem;
        padding: 1.2rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }
      .form-title {
        font-size: 1.2rem;
        font-weight: bold;
        color: #1565c0;
        text-align: center;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid #e3f2fd;
      }
      .form-item {
        margin-bottom: 1.2rem;
      }
      .form-item:last-child {
        margin-bottom: 0;
      }
      .form-label {
        font-size: 0.95rem;
        color: #333;
        margin-bottom: 0.5rem;
        display: block;
        font-weight: 500;
      }
      .required::before {
        content: "*";
        color: #f44336;
        margin-right: 0.2rem;
      }
      .form-input {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid #e0e0e0;
        border-radius: 0.5rem;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s;
        -webkit-appearance: none;
      }
      .form-input:focus {
        border-color: #1e88e5;
      }
      .radio-group {
        display: flex;
        gap: 2rem;
      }
      .radio-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        font-size: 0.95rem;
        color: #333;
      }
      .radio-item input {
        width: 1.2rem;
        height: 1.2rem;
        accent-color: #1e88e5;
      }
      .submit-btn {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%);
        color: #fff;
        border: none;
        border-radius: 0.5rem;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 1.5rem;
      }
      .submit-btn:active {
        opacity: 0.9;
      }
      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
    <script src="./jquery.min.js"></script>
  </head>
  <body>
    <div class="header">
      <span class="back-btn" onclick="history.back()">‹</span>
      <span class="header-title">参会回执</span>
    </div>

    <div class="notice-bar">
      <div class="notice-text">
        <span class="notice-icon">📋</span>
        <span>请于2026年7月27日前填写参会回执并提交。</span>
      </div>
    </div>

    <div class="form-container">
      <div class="form-card">
        <div class="form-title">参会回执</div>

        <div class="form-item">
          <label class="form-label required">姓名</label>
          <input
            type="text"
            class="form-input"
            placeholder="请输入姓名"
            id="name"
          />
        </div>

        <div class="form-item">
          <label class="form-label required">性别</label>
          <div class="radio-group">
            <label class="radio-item"
              ><input type="radio" name="gender" value="male" checked /><span
                >男</span
              ></label
            >
            <label class="radio-item"
              ><input type="radio" name="gender" value="female" /><span
                >女</span
              ></label
            >
          </div>
        </div>

        <div class="form-item">
          <label class="form-label required">单位</label>
          <input
            type="text"
            class="form-input"
            placeholder="请输入工作单位"
            id="company"
          />
        </div>

        <div class="form-item">
          <label class="form-label required">联系电话</label>
          <input
            type="tel"
            class="form-input"
            placeholder="请输入联系电话"
            id="phone"
          />
        </div>

        <div class="form-item">
          <label class="form-label required">房间需求</label>
          <div class="radio-group">
            <label class="radio-item"
              ><input type="radio" name="room" value="single" checked /><span
                >单间</span
              ></label
            >
            <label class="radio-item"
              ><input type="radio" name="room" value="share" /><span
                >合住</span
              ></label
            >
          </div>
        </div>

        <div class="form-item">
          <label class="form-label required">入住时间</label>
          <input type="date" class="form-input" id="checkin" />
        </div>

        <div class="form-item">
          <label class="form-label required">离店时间</label>
          <input type="date" class="form-input" id="checkout" />
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submitForm()">
          提交
        </button>
      </div>
    </div>

    <script>
      function submitForm() {
        var name = document.getElementById("name").value.trim();
        var phone = document.getElementById("phone").value.trim();
        var company = document.getElementById("company").value.trim();
        var checkin = document.getElementById("checkin").value;
        var checkout = document.getElementById("checkout").value;
        var gender = $('input[name="gender"]:checked').val();
        var room = $('input[name="room"]:checked').val();

        if (!name) {
          alert("请输入姓名");
          return;
        }
        if (!company) {
          alert("请输入工作单位");
          return;
        }
        if (!phone) {
          alert("请输入联系电话");
          return;
        }
        if (!checkin) {
          alert("请选择入住时间");
          return;
        }
        if (!checkout) {
          alert("请选择离店时间");
          return;
        }

        var submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        submitBtn.textContent = "提交中...";

        var formData = {
          name: name,
          gender: gender === "male" ? "男" : "女",
          company: company,
          phone: phone,
          room: room === "single" ? "单间" : "合住",
          checkin: checkin,
          checkout: checkout,
        };

        $.ajax({
          url: "https://collect.helifuwu.cn/api/info/save",
          type: "POST",
          contentType: "application/json",
          dataType: "json",
          headers: {
            "tag-source": "huiyi2",
          },
          data: JSON.stringify(formData),
          success: function (res) {
            window.location.href = "success.html";
          },
          error: function (xhr, status, error) {
            alert("提交失败，请稍后重试");
            submitBtn.disabled = false;
            submitBtn.textContent = "提交";
          },
        });
      }
    </script>
  </body>
</html>
